<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;800&display=swap" rel="stylesheet">
    <title>Web Speech Remote Control</title>
</head>
<body>
    <header>
        <h2 class="title">Web Speech Remote Control</h2>
    </header>
    <div class="login">
        <div class="loginformbox">
            <h1 class="logintext">Login</h1>
            <form class="form">
                <div class="loginbox">
                    <img src="person-circle.svg" class="icon">
                    <input type="text" required>
                    <label>Login</label>
                </div>
                <div class="loginbox">
                    <img src="lock-closed.svg" class="icon">
                    <input type="password" required>
                    <label>Password</label>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
